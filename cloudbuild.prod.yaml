# Production deploy for the Arbor API (Cloud Run) via Cloud Build.
#
# Usage:
#   gcloud builds submit --config cloudbuild.prod.yaml \
#     --substitutions=_REGION=europe-west4 \
#     --project <PROD_PROJECT_ID>
#
# Notes:
# - env.ts enforces prod invariants: MODEL_PROVIDER=vertex, MEMORY_ADAPTER=firestore,
#   ENABLE_LOCAL_MEMORY_ADAPTER=false, and BOTH GCP_PROJECT_ID and FIREBASE_PROJECT_ID
#   must be set or the server refuses to boot. The stage cloudbuild.yaml omits the
#   two project ids; this prod config sets them from $PROJECT_ID.
# - REQUIRE_AUTH=true makes /api routes verify Firebase ID tokens. On Cloud Run the
#   Admin SDK uses the service account's Application Default Credentials, so no
#   FIREBASE_CLIENT_EMAIL / FIREBASE_PRIVATE_KEY secrets are required.
# - The browser client is served by Firebase Hosting (see firebase.json), not this
#   image. Build + deploy hosting separately with the VITE_FIREBASE_* build env set
#   (see docs/deployment-production.md).
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - app/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/arbor/arbor-api:${_TAG}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/arbor/arbor-api:${_TAG}
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - arbor-api
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/arbor/arbor-api:${_TAG}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-env-vars
      # `^|^` switches the gcloud delimiter to | so CORS_ORIGINS can hold a
      # comma-separated origin list AND comp-email vars (ARBOR_*_EMAILS) can
      # contain '@'. (A '@' delimiter would split email addresses.)
      # ARBOR_FAMILY_EMAILS / ARBOR_ADMIN_EMAILS = comped founder/example accounts
      # (full Family + founder dashboard, no billing). Add more, comma-separated.
      - ^|^ARBOR_ENV=prod|MODEL_PROVIDER=vertex|MEMORY_ADAPTER=firestore|ENABLE_LOCAL_MEMORY_ADAPTER=false|ENABLE_HIGH_RISK_REVIEW_QUEUE=true|REQUIRE_AUTH=true|ENFORCE_ENTITLEMENTS=true|ARBOR_FAMILY_EMAILS=bguy.rubin@gmail.com|ARBOR_ADMIN_EMAILS=bguy.rubin@gmail.com|FREE_COACH_MESSAGES_PER_DAY=10|GCP_PROJECT_ID=$PROJECT_ID|FIREBASE_PROJECT_ID=$PROJECT_ID|GCP_REGION=${_REGION}|VERTEX_LOCATION=${_REGION}|VERTEX_MODEL_CHAT=gemini-2.5-flash|VERTEX_MODEL_IMAGE=gemini-2.5-flash-image|CHILD_ASR_PROVIDER=gemini|MAX_OUTPUT_TOKENS=8192|MEMORY_PROMPT_MAX_FACTS=40|CORS_ORIGINS=https://$PROJECT_ID.web.app,https://$PROJECT_ID.firebaseapp.com|APP_URL=https://$PROJECT_ID.web.app
      # Images use the AI-Studio Gemini API (separate quota from Vertex, which
      # 429s under arcade/story load). Key lives in Secret Manager, never in git.
      - --set-secrets
      - GEMINI_API_KEY=arbor-gemini-key:latest
substitutions:
  _REGION: europe-west4
  # _TAG is supplied at submit time (git short SHA). Defaults to "latest" so the
  # config is valid for manual `gcloud builds submit` runs where $SHORT_SHA is unset.
  _TAG: latest
images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/arbor/arbor-api:${_TAG}
