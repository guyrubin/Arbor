# =============================================================================
# SEC-8 — Supply-chain security scanning for Arbor CI
# =============================================================================
# THIS FILE IS A MERGE ARTIFACT, not a standalone workflow on its own (though it
# is a valid standalone workflow if you prefer — see "OPTION B" below).
#
# It contains a `security` job that runs OFF THE FAST PATH: it does not gate or
# slow the existing `app-quality-gates` job in .github/workflows/arbor-ci.yml.
# Every scan starts NON-BLOCKING (continue-on-error: true) so a fresh finding
# never red-lines the pipeline until the team opts in by flipping the flags noted
# inline. Stack is 100% free in GitHub Actions: npm audit, Trivy, Syft, gitleaks.
#
# ---- HOW TO MERGE (see INFRA-SNIPPETS.md for the precise diff) ---------------
# OPTION A (recommended — one workflow, two jobs):
#   Paste the `security:` job below into the `jobs:` map of
#   .github/workflows/arbor-ci.yml, as a SIBLING of `app-quality-gates`.
#   Do NOT add `needs: app-quality-gates` — they must run in parallel so a scan
#   never blocks merge-readiness of the quality gates.
#
# OPTION B (separate workflow file):
#   Save the block below (the `name:` + `on:` + `jobs:` with the security job)
#   as .github/workflows/arbor-security-scan.yml verbatim. Uncomment the `name:`
#   and `on:` keys at the top of this file.
#
# Also create .github/dependabot.yml — full content is inlined at the BOTTOM of
# this file under "----- .github/dependabot.yml -----".
# =============================================================================

# --- Uncomment these two keys ONLY for OPTION B (standalone workflow file) ----
# name: Arbor Security Scan
# on:
#   pull_request:
#   push:
#     branches:
#       - main
# ------------------------------------------------------------------------------

jobs:
  security:
    name: supply-chain-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # lets Trivy/gitleaks upload SARIF to the Security tab
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # gitleaks needs full history to scan commits

      # ---------------------------------------------------------------------
      # 1) Dependency vulnerabilities — npm audit (free; Dependabot complements
      #    this via .github/dependabot.yml). Runs in app/ where package-lock lives.
      #    NON-BLOCKING today. To make blocking: remove `continue-on-error` AND
      #    drop `|| true`, then it fails on a HIGH/CRITICAL advisory.
      # ---------------------------------------------------------------------
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: npm audit (high+)
        working-directory: app
        continue-on-error: true
        run: npm audit --audit-level=high || true

      # ---------------------------------------------------------------------
      # 2) Trivy filesystem scan — source + lockfile vuln + misconfig scan.
      #    Uploads SARIF to the GitHub Security tab. NON-BLOCKING (exit-code 0).
      #    To make blocking: set exit-code: '1'.
      # ---------------------------------------------------------------------
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          exit-code: '0'
      - name: Upload Trivy fs SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      # ---------------------------------------------------------------------
      # 3) Build the Cloud Run image and scan it with Trivy.
      #    Uses the SAME Dockerfile + build context as cloudbuild.prod.yaml:
      #      docker build -f app/Dockerfile -t <img> .   (context = repo root)
      #    Image is tagged locally only (never pushed). NON-BLOCKING.
      # ---------------------------------------------------------------------
      - name: Build Arbor API image (local, not pushed)
        run: docker build -f app/Dockerfile -t arbor-api:scan .
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          scan-type: image
          image-ref: arbor-api:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif
          exit-code: '0'
      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      # ---------------------------------------------------------------------
      # 4) SBOM (Syft) of the image, in CycloneDX. Retained as a build artifact
      #    (EU public-sector / B2G tenders increasingly request an SBOM).
      # ---------------------------------------------------------------------
      - name: Generate SBOM (Syft / CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: arbor-api:scan
          format: cyclonedx-json
          output-file: arbor-api.sbom.cdx.json
          upload-artifact: false
      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arbor-api-sbom
          path: arbor-api.sbom.cdx.json
          retention-days: 90

      # ---------------------------------------------------------------------
      # 5) Secret scanning (gitleaks) — belt-and-suspenders alongside GitHub
      #    native secret scanning + push protection (enable those in repo
      #    Settings -> Code security; see INFRA-SNIPPETS.md, human gate).
      #    NON-BLOCKING today (continue-on-error). gitleaks-action is free for
      #    public repos; for private repos it requires GITLEAKS_LICENSE (org
      #    free tier). If no license, swap to the `gitleaks/gitleaks` CLI step
      #    shown commented below.
      # ---------------------------------------------------------------------
      - name: gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # required for private orgs
      # --- License-free alternative (uncomment to use instead of the action) ---
      # - name: gitleaks (CLI, license-free)
      #   continue-on-error: true
      #   run: |
      #     curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
      #       | tar -xz gitleaks
      #     ./gitleaks detect --source . --redact --no-banner --exit-code 0 \
      #       --report-format sarif --report-path gitleaks.sarif
      # - name: Upload gitleaks SARIF
      #   if: always()
      #   uses: github/codeql-action/upload-sarif@v3
      #   continue-on-error: true
      #   with:
      #     sarif_file: gitleaks.sarif
      #     category: gitleaks

